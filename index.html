<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fujita Yutaka — Bar Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #d4af6a; font-family: 'Cormorant Garamond', 'Noto Serif JP', serif; max-width: 480px; margin: 0 auto; }
.hero { position: relative; width: 100%; aspect-ratio: 3 / 4; overflow: hidden; }
.hero img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
.hero-name { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.88) 60%); padding: 50px 20px 28px; text-align: center; }
.hero-name .en { font-size: 32px; letter-spacing: 7px; color: #d4af6a; font-weight: 300; text-transform: uppercase; line-height: 1.2; }
.hero-name .sub { font-size: 11px; letter-spacing: 4px; color: #8a7040; margin-top: 8px; text-transform: uppercase; }
.gold-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #d4af6a, #ffe08a, #d4af6a, transparent); }
.ornament { text-align: center; color: #3a2e10; font-size: 16px; letter-spacing: 8px; padding: 6px 0; }
.section { padding: 24px 20px; background: #0a0a0a; }
.section-title { font-size: 11px; letter-spacing: 5px; color: #8a7040; text-transform: uppercase; text-align: center; margin-bottom: 18px; }
.price-list { display: flex; flex-direction: column; border: 0.5px solid #3a2e10; border-radius: 4px; overflow: hidden; }
.price-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; background: #111008; border-bottom: 0.5px solid #1e1800; }
.price-item:last-child { border-bottom: none; }
.price-item.featured { background: #141008; }
.price-item.featured .price-item-amount { color: #ffe08a; }
.price-item-name { font-size: 16px; color: #d4af6a; letter-spacing: 2px; font-weight: 300; }
.price-item-name small { display: block; font-size: 10px; color: #5a4820; letter-spacing: 1px; margin-top: 3px; }
.price-item-amount { font-size: 19px; color: #d4af6a; font-weight: 300; letter-spacing: 1px; }
.price-item-amount span { font-size: 11px; color: #8a7040; margin-left: 2px; }
.reserve-form { display: flex; flex-direction: column; gap: 12px; }
.form-row { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 10px; letter-spacing: 3px; color: #8a7040; text-transform: uppercase; }
.form-input { background: #111008; border: 0.5px solid #3a2e10; border-radius: 3px; color: #d4af6a; padding: 12px 14px; font-family: 'Noto Serif JP', serif; font-size: 15px; width: 100%; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.form-input:focus { border-color: #d4af6a; }
.form-input::placeholder { color: #3a2e10; }
select.form-input option { background: #111008; color: #d4af6a; }
textarea.form-input { resize: none; }
.submit-btn { background: transparent; border: 0.5px solid #d4af6a; color: #d4af6a; padding: 16px; font-family: 'Cormorant Garamond', serif; font-size: 14px; letter-spacing: 5px; text-transform: uppercase; width: 100%; cursor: pointer; transition: background 0.3s; margin-top: 6px; }
.submit-btn:hover { background: rgba(212,175,106,0.08); }
.submit-btn:disabled { opacity: 0.4; cursor: default; }
.success-msg { display: none; text-align: center; padding: 18px; color: #d4af6a; font-size: 14px; letter-spacing: 2px; border: 0.5px solid #d4af6a; border-radius: 4px; margin-top: 12px; line-height: 1.8; }
.sns-row { display: flex; justify-content: center; gap: 14px; padding: 24px 20px 32px; }
.sns-btn { display: flex; flex-direction: column; align-items: center; gap: 7px; text-decoration: none; padding: 16px 12px; border: 0.5px solid #3a2e10; border-radius: 4px; background: #111008; color: #d4af6a; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; transition: border-color 0.3s; flex: 1; max-width: 110px; }
.sns-btn:hover { border-color: #d4af6a; }
.sns-btn.disabled { opacity: 0.3; pointer-events: none; }
.sns-icon { font-size: 22px; color: #d4af6a; }
.footer { text-align: center; padding: 14px; font-size: 10px; color: #3a2e10; letter-spacing: 3px; }
</style>
</head>

<script>
async function submitForm() {
  var name = document.getElementById('rName').value;
  var tel = document.getElementById('rTel').value;
  var date = document.getElementById('rDate').value;
  var guests = document.getElementById('rGuests').value;
  var note = document.getElementById('rNote').value;
  if (!name || !tel || !date || !guests) {
    alert('必須項目を入力してください');
    return;
  }
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  var data = new FormData();
  data.append('お名前', name);
  data.append('連絡先', tel);
  data.append('希望日時', date);
  data.append('人数', guests);
  data.append('ご要望', note);
  try {
    var res = await fetch('https://formspree.io/f/xojzjgpa', {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      document.getElementById('successMsg').style.display = 'block';
      btn.textContent = '送信済み';
    } else {
      alert('送信に失敗しました。もう一度お試しください。');
      btn.disabled = false;
      btn.textContent = '予約リクエストを送る';
    }
  } catch(e) {
    alert('通信エラーが発生しました。もう一度お試しください。');
    btn.disabled = false;
    btn.textContent = '予約リクエストを送る';
  }
}
</script>
